<!DOCTYPE html>
<html>
<head>
    <title>MovieFlix</title>

    <!-- 📱 MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎬 MovieFlix</h1>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search movie...">
  <button onclick="searchMovies()">Search</button>
  <button onclick="clearSearch()">✖</button>
</div>

<!-- CATEGORY -->
<div class="categories">
    <button onclick="loadCategory(28)">Action</button>
    <button onclick="loadCategory(35)">Comedy</button>
    <button onclick="loadCategory(18)">Drama</button>
    <button onclick="loadCategory(16)">Cartoon</button>
</div>

<!-- LANGUAGE -->
<div class="categories">
    <button onclick="loadLanguage('en')">English</button>
    <button onclick="loadLanguage('hi')">Hindi</button>
    <button onclick="loadLanguage('bn')">Bangla</button>
</div>

<!-- MOVIES GRID -->
<div id="movies"></div>

<!-- LOAD MORE -->
<div style="text-align:center; margin: 15px;">
  <button onclick="loadMore()">Load More</button>
</div>

<!-- ===================== -->
<!-- 🎬 MODAL (TRAILER) -->
<!-- ===================== -->
<div id="modal" class="modal">

    <div class="modal-content">

        <!-- close button -->
        <span onclick="closeModal()" 
              style="cursor:pointer; float:right; font-size:22px; color:white;">
              &times;
        </span>

        <!-- trailer video -->
        <iframe id="trailer"></iframe>

        <!-- ⏱ trailer duration (IMPORTANT) -->
        <p id="duration" style="text-align:center; margin:10px; color:white; font-size:16px;">
        </p>

        <!-- exit button -->
        <button onclick="closeModal()">Exit</button>

    </div>

</div>

<!-- JS FILE -->
<script src="script.js"></script>

</body>
</html>
